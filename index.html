<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прогноз погоды</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sky-bg" class="sky-bg" aria-hidden="true"></div>
  <div id="weather-overlay" class="weather-overlay" aria-hidden="true"></div>
  <div id="sun-glow" class="sun-glow" aria-hidden="true"></div>
  <div id="star-field" class="star-field" aria-hidden="true"></div>
  <div id="cloud-layer" class="cloud-layer" aria-hidden="true">
    <span class="cloud c1"></span>
    <span class="cloud c2"></span>
    <span class="cloud c3"></span>
  </div>
  <canvas id="fx-canvas" class="fx-canvas" aria-hidden="true"></canvas>
  <div id="lightning-flash" class="lightning-flash" aria-hidden="true"></div>

  <div id="mascot" class="mascot" aria-hidden="true">
    <div id="mascot-bubble" class="mascot-bubble">
      <span id="mascot-phrase"></span>
    </div>
    <svg class="mascot-figure" viewBox="0 0 120 120" width="96" height="96">
      <path class="m-ear m-ear-left" d="M28 38 L20 14 L44 30 Z"></path>
      <path class="m-ear m-ear-right" d="M92 38 L100 14 L76 30 Z"></path>
      <line class="m-antenna" x1="60" y1="10" x2="60" y2="26"></line>
      <circle class="m-antenna-tip" cx="60" cy="8" r="4"></circle>
      <rect class="m-head" x="20" y="30" width="80" height="70" rx="26"></rect>
      <circle class="m-eye m-eye-left" cx="45" cy="64" r="5.5"></circle>
      <circle class="m-eye m-eye-right" cx="75" cy="64" r="5.5"></circle>
      <path class="m-mouth" d="M50 80 Q60 88 70 80"></path>
      <g class="m-accessory m-sunglasses">
        <rect x="35" y="57" width="20" height="13" rx="4"></rect>
        <rect x="65" y="57" width="20" height="13" rx="4"></rect>
        <line x1="55" y1="62" x2="65" y2="62"></line>
      </g>
      <g class="m-accessory m-scarf">
        <path d="M20 96 Q60 114 100 96 L100 108 Q60 124 20 108 Z"></path>
      </g>
    </svg>
    <svg class="m-accessory m-umbrella" viewBox="0 0 60 70" width="46" height="54">
      <path d="M30 4 C10 4 2 24 2 28 L58 28 C58 24 50 4 30 4 Z"></path>
      <line x1="30" y1="28" x2="30" y2="60"></line>
      <path d="M30 60 q0 8 8 8" fill="none"></path>
    </svg>
  </div>

  <div class="app">
    <header class="topbar">
      <h1>Погода</h1>
      <form id="search-form" class="search" autocomplete="off">
        <input id="search-input" type="text" placeholder="Город, например: Москва" />
        <button type="submit" aria-label="Найти">Найти</button>
        <button type="button" id="geo-btn" title="Моё местоположение" aria-label="Моё местоположение">📍</button>
      </form>
    </header>

    <div id="suggestions" class="suggestions hidden"></div>

    <main id="content" class="content">
      <p class="hint">Введите город или разрешите доступ к геолокации, чтобы увидеть прогноз.</p>
    </main>

    <div id="status" class="status hidden"></div>
  </div>

  <template id="tpl-current">
    <section class="current">
      <div class="current-main">
        <div class="place"></div>
        <div class="temp"></div>
        <div class="desc"></div>
      </div>
      <div class="icon"></div>
      <div class="details">
        <div><span>Ощущается как</span><b class="feels"></b></div>
        <div><span>Влажность</span><b class="humidity"></b></div>
        <div><span>Ветер</span><b class="wind"></b></div>
        <div><span>Давление</span><b class="pressure"></b></div>
      </div>
    </section>
  </template>

  <template id="tpl-hourly-item">
    <div class="hour-item">
      <div class="h-time"></div>
      <div class="h-icon"></div>
      <div class="h-temp"></div>
    </div>
  </template>

  <template id="tpl-day-item">
    <div class="day-item">
      <div class="d-name"></div>
      <div class="d-icon"></div>
      <div class="d-desc"></div>
      <div class="d-temps"><b class="d-max"></b><span class="d-min"></span></div>
    </div>
  </template>

  <template id="tpl-rec-item">
    <div class="rec-item">
      <div class="rec-icon"></div>
      <div class="rec-text"></div>
    </div>
  </template>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="atmosphere.js"></script>
  <script src="app.js"></script>
</body>
</html>
